﻿<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Kho hàng & Chuỗi Cửa hàng</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .shadow-inner {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Mock Lucide Component ---
        const Icon = ({ name, size = 18, className = "", ...props }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className} {...props}></i>;
        };

        // --- CONFIG & CONSTANTS ---
        const SHIFT_SLOTS = [
            { id: 'S1', label: 'Ca 1', time: '08:00 - 12:00' },
            { id: 'S2', label: 'Ca 2', time: '12:00 - 16:00' },
            { id: 'S3', label: 'Ca 3', time: '16:00 - 20:00' },
            { id: 'S4', label: 'Ca 4', time: '20:00 - 00:00' },
        ];

        const DAYS_OF_WEEK = [
            { id: 'Mon', label: 'T2' },
            { id: 'Tue', label: 'T3' },
            { id: 'Wed', label: 'T4' },
            { id: 'Thu', label: 'T5' },
            { id: 'Fri', label: 'T6' },
            { id: 'Sat', label: 'T7' },
            { id: 'Sun', label: 'CN' },
        ];

        const CATEGORIES = {
            'Thời trang': '👕',
            'Điện tử': '💻',
            'Thực phẩm': '🍱',
            'Phụ kiện': '👜',
            'Nguyên liệu': '📦'
        };

        const initialGlobalProducts = [
            { id: 'p1', sku: 'THUN-COT-01', name: 'Áo thun Cotton', category: 'Thời trang', basePrice: 150000, warehouseStock: 500, unit: 'cái', description: 'Áo thun 100% cotton co giãn 4 chiều' },
            { id: 'p2', sku: 'JEAN-SLIM-02', name: 'Quần Jeans Slimfit', category: 'Thời trang', basePrice: 450000, warehouseStock: 200, unit: 'cái', description: 'Dáng ôm vừa vặn, màu xanh denim' },
            { id: 'p3', sku: 'LAP-DELL-15', name: 'Laptop Dell Inspiron 15', category: 'Điện tử', basePrice: 15000000, warehouseStock: 25, unit: 'cái', description: 'Core i5, RAM 8GB, SSD 256GB' },
            { id: 'p4', sku: 'MOUSE-LOG-185', name: 'Chuột không dây Logitech', category: 'Điện tử', basePrice: 250000, warehouseStock: 150, unit: 'cái', description: 'Kết nối ổn định, pin bền' },
        ];

        const initialStores = [
            {
                id: '1',
                name: 'Chi nhánh Quận 1',
                location: '123 Lê Lợi, Phường Bến Thành, Q.1',
                employees: [
                    { 
                        id: 'e1', name: 'Nguyễn Văn A', role: 'Quản lý', phone: '0901234567', username: 'nv_quan1', password: '123',
                        schedule: { Mon: ['S1', 'S2'], Tue: ['S1', 'S2'], Wed: ['S1', 'S2'], Thu: ['S1', 'S2'], Fri: ['S1', 'S2'], Sat: [], Sun: [] }
                    },
                ],
                inventory: [
                    { productId: 'p1', quantity: 50, sold: 12 },
                    { productId: 'p3', quantity: 3, sold: 1 }
                ],
                transactions: []
            },
            {
                id: '2',
                name: 'Chi nhánh Quận 7',
                location: '456 Nguyễn Văn Linh, Q.7',
                employees: [
                     { 
                        id: 'e3', name: 'Trần Văn C', role: 'Quản lý', phone: '0909999999', username: 'nv_quan7', password: '123',
                        schedule: { Mon: ['S1'], Tue: ['S1'], Wed: ['S1'], Thu: ['S1'], Fri: ['S1'], Sat: [], Sun: [] }
                    },
                ],
                inventory: [],
                transactions: []
            }
        ];

        // --- COMPONENTS ---

        const TabButton = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`flex items-center space-x-3 px-6 h-14 rounded-2xl font-black text-[13px] uppercase tracking-tighter transition-all ${active ? 'bg-blue-600 text-white shadow-xl shadow-blue-100' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-50'}`}>
                <Icon name={icon} /> <span>{label}</span>
            </button>
        );

        const SubTabButton = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`flex items-center space-x-2.5 px-8 py-3.5 rounded-2xl font-black text-[11px] uppercase tracking-widest transition-all ${active ? 'bg-white text-blue-600 shadow-sm border border-slate-100' : 'text-slate-400 hover:text-slate-600'}`}>
                <Icon name={icon} size={16} /> <span>{label}</span>
            </button>
        );

        const SummaryMiniCard = ({ label, value, color = "text-slate-900", icon }) => (
            <div className="bg-white p-6 rounded-[24px] border border-slate-100 shadow-sm text-left">
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 flex items-center">
                    {label} {icon && <span className="ml-1">{icon}</span>}
                </p>
                <p className={`text-2xl font-black ${color}`}>{value}</p>
            </div>
        );

        const SummaryBigCard = ({ icon, color, label, value }) => (
            <div className={`${color} p-10 rounded-[50px] shadow-2xl flex items-center space-x-8 hover:-translate-y-2 transition-all group text-white`}>
                <div className="bg-white/20 p-6 rounded-[35px] backdrop-blur-md border border-white/30 shadow-xl group-hover:scale-110 transition-transform text-white flex items-center justify-center">
                    <Icon name={icon} size={28} />
                </div>
                <div>
                    <p className="text-[11px] font-black text-white/70 uppercase tracking-[0.3em] mb-1 leading-none">{label}</p>
                    <h3 className="text-4xl font-black leading-none tracking-tighter">{value}</h3>
                </div>
            </div>
        );

        const Input = ({ label, ...props }) => (
            <div className="space-y-2 w-full text-left">
                <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">{label}</label>
                <input {...props} className="w-full px-6 py-5 bg-slate-50 border border-slate-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:bg-white font-bold text-slate-700 shadow-inner transition-all placeholder:font-medium placeholder:text-slate-300" onChange={e => props.onChange ? props.onChange(e.target.value) : null}/>
            </div>
        );

        const Select = ({ label, children, value, onChange, ...props }) => (
            <div className="space-y-2 w-full text-left">
                <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">{label}</label>
                <div className="relative">
                    <select value={value} {...props} className="w-full px-6 py-5 bg-slate-50 border border-slate-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:bg-white font-bold text-slate-700 appearance-none shadow-inner cursor-pointer transition-all" onChange={e => onChange ? onChange(e.target.value) : null}>
                        {children}
                    </select>
                    <div className="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                        <Icon name="chevron-down" size={22} />
                    </div>
                </div>
            </div>
        );

        // --- APP LOGIC ---

        const App = () => {
            const getCache = (key, fallback) => {
                const saved = localStorage.getItem(key);
                return saved ? JSON.parse(saved) : fallback;
            };

            const setCache = (key, value) => {
                localStorage.setItem(key, JSON.stringify(value));
            };

            const [user, setUser] = useState(() => getCache('chain_user', null)); 
            const [stores, setStores] = useState(() => getCache('chain_stores', initialStores));
            const [globalProducts, setGlobalProducts] = useState(() => getCache('chain_products', initialGlobalProducts));
            const [warehouseTransactions, setWarehouseTransactions] = useState(() => getCache('chain_warehouse_tx', []));

            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedStore, setSelectedStore] = useState(null);
            const [storeSubTab, setStoreSubTab] = useState('inventory'); 
            const [showModal, setShowModal] = useState(null); 
            const [pendingAction, setPendingAction] = useState(null); 
            const [editingEmployee, setEditingEmployee] = useState(null);
            const [toast, setToast] = useState(null);
            const [showUserMenu, setShowUserMenu] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            // Sync with Cache
            useEffect(() => { 
                setCache('chain_user', user); 
                if(user && user.role === 'staff') setActiveTab('my-store'); 
            }, [user]);
            useEffect(() => { setCache('chain_stores', stores); }, [stores]);
            useEffect(() => { setCache('chain_products', globalProducts); }, [globalProducts]);
            useEffect(() => { setCache('chain_warehouse_tx', warehouseTransactions); }, [warehouseTransactions]);

            const currentStore = useMemo(() => {
                if (!user) return null;
                return selectedStore || (user.role === 'staff' ? stores.find(s => s.id === user.storeId) : null);
            }, [selectedStore, user, stores]);

            // Toàn bộ nhân sự chuỗi
            const allEmployees = useMemo(() => {
                return stores.flatMap(s => s.employees.map(e => ({ ...e, storeName: s.name, storeId: s.id })));
            }, [stores]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginForm.username === 'admin' && loginForm.password === 'admin') {
                    setUser({ username: 'Admin Manager', role: 'admin', name: 'Quản trị viên' });
                    setActiveTab('dashboard');
                } else {
                    let found = null;
                    let sId = null;
                    stores.forEach(s => {
                        const e = s.employees.find(emp => emp.username === loginForm.username && emp.password === loginForm.password);
                        if (e) { found = e; sId = s.id; }
                    });
                    if (found) {
                        setUser({ username: found.username, role: 'staff', storeId: sId, name: found.name, staffRole: found.role });
                    } else setLoginError('Sai tài khoản hoặc mật khẩu!');
                }
            };

            const handleLogout = () => {
                setUser(null); setSelectedStore(null); setShowUserMenu(false);
                localStorage.removeItem('chain_user');
            };

            const requestConfirm = (actionConfig) => {
                setPendingAction(actionConfig);
                setShowModal('confirmPopup');
            };

            const handleSaveEmployee = (storeId, employeeData) => {
                if (!storeId) return;
                const isEdit = !!editingEmployee;
                requestConfirm({
                    type: isEdit ? 'edit' : 'add', title: isEdit ? 'Cập nhật' : 'Đăng ký mới',
                    message: `Lưu hồ sơ cho ${employeeData.name}?`,
                    onConfirm: () => {
                        setStores(stores.map(s => {
                            if (s.id === storeId) {
                                if (isEdit) { return { ...s, employees: s.employees.map(e => e.id === editingEmployee.id ? { ...employeeData, id: e.id } : e) }; }
                                else { return { ...s, employees: [...s.employees, { ...employeeData, id: 'e' + Date.now() }] }; }
                            }
                            return s;
                        }));
                        setShowModal(null); setEditingEmployee(null); showToast("Đã cập nhật nhân sự.");
                    }
                });
            };

            const handleDeleteEmployee = (storeId, empId, empName) => {
                requestConfirm({
                    type: 'delete', title: 'Xóa nhân sự',
                    message: `Gỡ bỏ "${empName}" khỏi hệ thống?`,
                    onConfirm: () => {
                        setStores(stores.map(s => s.id === storeId ? { ...s, employees: s.employees.filter(e => e.id !== empId) } : s));
                        setShowModal(null); showToast("Đã xóa nhân sự.");
                    }
                });
            };

            const handleSaveGlobalProduct = (productData) => {
                requestConfirm({
                    type: 'add', title: 'Tạo sản phẩm',
                    message: `Thêm "${productData.name}" vào danh mục?`,
                    onConfirm: () => {
                        const newProduct = { ...productData, id: 'p' + Date.now(), warehouseStock: Number(productData.initialStock || 0), basePrice: Number(productData.basePrice) };
                        setGlobalProducts([...globalProducts, newProduct]);
                        setShowModal(null); showToast("Đã tạo sản phẩm.");
                    }
                });
            };

            const handleImportToWarehouse = (productId, amount) => {
                setGlobalProducts(globalProducts.map(p => p.id === productId ? { ...p, warehouseStock: p.warehouseStock + Number(amount) } : p));
                showToast("Đã cập nhật kho tổng.");
            };

            const handleDistribute = (storeId, productId, amount) => {
                const qty = Number(amount);
                setGlobalProducts(globalProducts.map(p => p.id === productId ? { ...p, warehouseStock: p.warehouseStock - qty } : p));
                setStores(stores.map(s => {
                    if (s.id === storeId) {
                        const exist = s.inventory.find(i => i.productId === productId);
                        const inv = exist ? s.inventory.map(i => i.productId === productId ? { ...i, quantity: i.quantity + qty } : i) : [...s.inventory, { productId, quantity: qty, sold: 0 }];
                        return { ...s, inventory: inv };
                    }
                    return s;
                }));
                setShowModal(null); showToast("Đã phân phối hàng.");
            };

            const handleAddStore = (storeData) => {
                setStores([...stores, { ...storeData, id: 's' + Date.now(), employees: [], inventory: [], transactions: [] }]);
                setShowModal(null); showToast("Đã mở chi nhánh.");
            };

            const handleDeleteStore = (storeId, storeName) => {
                requestConfirm({
                    type: 'delete', title: 'Xóa chi nhánh',
                    message: `Xác nhận xóa hoàn toàn chi nhánh "${storeName}"?`,
                    onConfirm: () => {
                        setStores(stores.filter(s => s.id !== storeId));
                        setSelectedStore(null); setShowModal(null); showToast("Đã xóa chi nhánh.");
                    }
                });
            };

            const handleSellProduct = (storeId, productId) => {
                setStores(stores.map(s => s.id === storeId ? { ...s, inventory: s.inventory.map(i => i.productId === productId ? { ...i, quantity: i.quantity - 1, sold: (i.sold || 0) + 1 } : i) } : s));
                showToast("Đã ghi nhận bán hàng.");
            };

            const getProductInfo = (pid) => globalProducts.find(p => p.id === pid) || { name: 'N/A', sku: 'N/A', category: 'N/A', unit: 'cái' };

            // --- UI RENDER ---

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
                        <div className="w-full max-w-[380px] bg-white rounded-[32px] shadow-2xl p-10 text-center">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-50 text-blue-600 mb-6"><Icon name="package" size={32} /></div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tight mb-2 uppercase">ĐĂNG NHẬP</h1>
                            <p className="text-slate-400 text-sm mb-8 font-medium leading-relaxed">Hệ thống quản lý chuỗi hợp nhất<br/>v2.5 Professional</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                {loginError && <div className="bg-rose-50 text-rose-600 p-4 rounded-xl text-xs font-bold border border-rose-100">{loginError}</div>}
                                <input type="text" required className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="Username" value={loginForm.username} onChange={e => setLoginForm({...loginForm, username: e.target.value})} />
                                <input type="password" required className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="Password" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} />
                                <button className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all uppercase text-xs tracking-widest mt-4">Vào hệ thống</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b sticky top-0 z-50 h-20 px-8 flex items-center justify-between shadow-sm">
                        <div className="flex items-center space-x-6 lg:space-x-10">
                            <div className="flex items-center space-x-3 cursor-pointer group" onClick={() => user.role === 'admin' && setActiveTab('dashboard')}>
                                <div className="bg-blue-600 p-2.5 rounded-xl shadow-lg group-hover:scale-105 transition-transform"><Icon name="package" size={22} className="text-white" /></div>
                                <h1 className="text-xl font-black tracking-tighter text-slate-900 uppercase hidden sm:block">ChainFlow</h1>
                            </div>
                            <nav className="flex items-center space-x-1 h-20 overflow-x-auto no-scrollbar">
                                {user.role === 'admin' ? (
                                    <>
                                        <TabButton active={activeTab === 'dashboard'} onClick={() => {setActiveTab('dashboard'); setSelectedStore(null)}} label="Tổng quan" icon="layout-dashboard" />
                                        <TabButton active={activeTab === 'stores'} onClick={() => {setActiveTab('stores'); setSelectedStore(null)}} label="Chi nhánh" icon="store" />
                                        <TabButton active={activeTab === 'warehouse'} onClick={() => {setActiveTab('warehouse'); setSelectedStore(null)}} label="Kho tổng" icon="warehouse" />
                                        <TabButton active={activeTab === 'staff-global'} onClick={() => {setActiveTab('staff-global'); setSelectedStore(null)}} label="Nhân sự" icon="users" />
                                    </>
                                ) : (
                                    <TabButton active={activeTab === 'my-store'} onClick={() => setActiveTab('my-store')} label="Chi nhánh của tôi" icon="store" />
                                )}
                            </nav>
                        </div>
                        <div className="relative">
                            <button onClick={() => setShowUserMenu(!showUserMenu)} className="flex items-center space-x-3 bg-slate-50 p-1.5 pr-4 rounded-2xl border hover:bg-slate-100 transition-all">
                                <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black text-sm uppercase">{user.name.charAt(0)}</div>
                                <div className="text-left hidden sm:block leading-none mr-2">
                                    <p className="text-xs font-black text-slate-900 leading-none">{user.name}</p>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mt-1 leading-none">{user.role === 'admin' ? 'Hệ thống' : 'Chi nhánh'}</p>
                                </div>
                                <Icon name="chevron-down" size={14} className="text-slate-300" />
                            </button>
                            {showUserMenu && (
                                <div className="absolute right-0 top-full mt-2 w-48 bg-white rounded-3xl shadow-2xl border border-slate-100 p-2 z-[60] overflow-hidden animate-in slide-in-from-top-2">
                                    <button onClick={handleLogout} className="w-full flex items-center space-x-3 px-4 py-4 text-xs font-black text-rose-500 hover:bg-rose-50 rounded-2xl transition-all uppercase tracking-widest"><Icon name="log-out" size={16}/> <span>Đăng xuất</span></button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 p-8 max-w-[1400px] mx-auto w-full">
                        {toast && <div className="fixed bottom-8 right-8 z-[100] bg-slate-900 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center space-x-4 animate-in slide-in-from-right"><Icon name="check-circle-2" size={16} className="text-emerald-400"/><p className="text-sm font-bold">{toast}</p></div>}

                        {/* DASHBOARD */}
                        {user.role === 'admin' && activeTab === 'dashboard' && !selectedStore && (
                            <div className="space-y-10 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-white text-left">
                                    <SummaryBigCard color="bg-blue-600" label="Sản phẩm kho tổng" value={globalProducts.reduce((a,p)=>a+p.warehouseStock, 0)} icon="warehouse"/>
                                    <SummaryBigCard color="bg-emerald-500" label="Hàng tại cửa hàng" value={stores.reduce((a,s)=>a+s.inventory.reduce((sum,i)=>sum+i.quantity,0), 0)} icon="package"/>
                                    <SummaryBigCard color="bg-indigo-600" label="Nhân sự hệ thống" value={allEmployees.length} icon="users"/>
                                </div>
                                <div className="bg-white rounded-[40px] border p-10 text-left shadow-sm">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-2xl font-black tracking-tight">Chi nhánh hoạt động</h3>
                                        <button onClick={() => setActiveTab('stores')} className="text-xs font-black text-blue-600 hover:underline uppercase">Tất cả chi nhánh</button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {stores.map(s => (
                                            <div key={s.id} onClick={()=>{setSelectedStore(s); setActiveTab('stores')}} className="p-8 bg-slate-50 hover:bg-blue-50 rounded-[40px] border border-transparent hover:border-blue-200 transition-all cursor-pointer flex justify-between items-center group shadow-sm">
                                                <div className="flex items-center gap-6">
                                                    <div className="w-16 h-16 rounded-[25px] bg-white flex items-center justify-center text-blue-600 shadow-sm border group-hover:scale-105 transition-all"><Icon name="store" size={24}/></div>
                                                    <div><p className="font-black text-xl text-slate-900 leading-none mb-1">{s.name}</p><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{s.employees.length} thành viên trực ca</p></div>
                                                </div>
                                                <div className="w-12 h-12 rounded-full bg-white flex items-center justify-center text-slate-300 group-hover:text-blue-600 shadow-sm transition-all"><Icon name="chevron-right" size={20}/></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* GLOBAL EMPLOYEES TAB (New!) */}
                        {user.role === 'admin' && activeTab === 'staff-global' && (
                            <div className="space-y-8 animate-fade-in">

                                    <div className="flex gap-4">
                                        <div className="relative">
                                            <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />

                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[40px] border shadow-sm overflow-hidden p-2">
                                    <table className="w-full text-left text-sm border-separate border-spacing-y-2">
                                        <thead className="bg-slate-50/50 border-b">
                                            <tr className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                                <th className="px-10 py-6 text-left">Nhân viên</th>
                                                <th className="px-10 py-6 text-center">Vai trò</th>
                                                <th className="px-10 py-6 text-center">Chi nhánh gán</th>
                                                <th className="px-10 py-6 text-center">Tài khoản</th>
                                                <th className="px-10 py-6 text-right pr-14">Hành động</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">

                                                <tr key={e.id} className="hover:bg-blue-50/20 transition-all rounded-3xl group">
                                                    <td className="px-10 py-8 min-w-[250px] text-left flex items-center gap-4">

                                                    </td>
                                                    <td className="px-10 py-8 text-center uppercase">
                                                        <span className={`px-4 py-1.5 rounded-full font-black text-[10px] border-2 ${e.role === 'Quản lý' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{e.role}</span>
                                                    </td>
                                                    <td className="px-10 py-8 text-center">
                                                        <p className="font-bold text-blue-600">{e.storeName}</p>
                                                    </td>
                                                    <td className="px-10 py-8 text-center font-mono font-bold text-slate-400 text-xs">@{e.username}</td>
                                                    <td className="px-10 py-8 text-right pr-14">
                                                        <div className="flex justify-end gap-2">
                                                            <button onClick={() => { setSelectedStore(stores.find(s=>s.id===e.storeId)); setActiveTab('stores'); setStoreSubTab('employees'); }} className="p-3 text-slate-400 hover:text-blue-500 rounded-xl hover:bg-white transition-all"><Icon name="clock" size={18}/></button>
                                                            <button onClick={() => { setEditingEmployee(e); setSelectedStore(stores.find(s=>s.id===e.storeId)); setShowModal('editEmployee'); }} className="p-3 text-slate-400 hover:text-indigo-500 rounded-xl hover:bg-white transition-all"><Icon name="edit-2" size={18}/></button>
                                                            <button onClick={() => handleDeleteEmployee(e.storeId, e.id, e.name)} className="p-3 text-slate-400 hover:text-rose-500 rounded-xl hover:bg-white transition-all"><Icon name="trash-2" size={18}/></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* STORES TAB */}
                        {user.role === 'admin' && activeTab === 'stores' && !selectedStore && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="flex justify-between items-center text-left">
                                    <div><h2 className="text-3xl font-black text-slate-900 tracking-tight leading-none mb-1">Mạng lưới Chi nhánh</h2><p className="text-slate-400 font-bold text-sm uppercase tracking-widest">Đang vận hành {stores.length} địa điểm</p></div>
                                    <button onClick={() => setShowModal('addStore')} className="bg-blue-600 text-white px-8 py-4 rounded-[24px] font-black text-xs uppercase tracking-widest shadow-xl flex items-center hover:scale-105 transition-all"><Icon name="plus" size={18} className="mr-2"/> Thêm chi nhánh</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {stores.map(s => (
                                        <div key={s.id} onClick={() => setSelectedStore(s)} className="bg-white p-8 rounded-[40px] border shadow-sm hover:shadow-2xl transition-all group cursor-pointer relative overflow-hidden flex flex-col h-full border-b-4 border-b-transparent hover:border-b-blue-600">
                                            <div className="bg-blue-50 text-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><Icon name="store" size={28}/></div>
                                            <h3 className="font-black text-2xl text-slate-900 mb-2 text-left">{s.name}</h3>
                                            <p className="text-sm text-slate-400 flex items-center font-medium mb-auto text-left leading-relaxed"><Icon name="map-pin" size={14} className="mr-2 text-blue-500 shrink-0"/> {s.location}</p>
                                            <div className="mt-8 pt-6 border-t flex items-center justify-between">
                                                <span className="text-[11px] font-black text-slate-500 uppercase flex items-center gap-1.5"><Icon name="users" size={14} className="text-slate-300"/> {s.employees.length} Nhân sự</span>
                                                <div className="flex items-center text-xs font-black text-blue-600 uppercase tracking-tighter">Chi tiết <Icon name="chevron-right" size={16} className="ml-1 group-hover:translate-x-1 transition-transform" /></div>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); handleDeleteStore(s.id, s.name); }} className="absolute top-6 right-6 p-2 text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" size={18}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* WAREHOUSE TAB */}
                        {user.role === 'admin' && activeTab === 'warehouse' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-8 rounded-[32px] border shadow-sm text-left">
                                    <div className="flex items-center gap-6">
                                        <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl"><Icon name="warehouse" size={32}/></div>
                                        <div><h2 className="text-3xl font-black text-slate-900 leading-none">Quản Lý Kho Hàng</h2><p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Dữ liệu hàng hóa toàn hệ thống</p></div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button className="flex items-center px-5 py-3 bg-slate-50 border rounded-xl text-[11px] font-black uppercase tracking-widest hover:bg-slate-100 transition-all">Xuất CSV</button>
                                        <button onClick={() => setShowModal('addGlobalProduct')} className="flex items-center px-8 py-3 bg-blue-600 text-white rounded-xl text-[11px] font-black uppercase tracking-widest shadow-lg hover:bg-blue-700 transition-all active:scale-95"><Icon name="plus" size={18} className="mr-2" /> Thêm sản phẩm</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 text-left">
                                    <SummaryMiniCard label="Tổng danh mục" value={globalProducts.length} />
                                    <SummaryMiniCard label="Giá trị tồn kho" value={totalValue.toLocaleString() + " đ"} color="text-blue-600" />
                                    <SummaryMiniCard label="Sắp hết hàng" value={globalProducts.filter(p=>p.warehouseStock>0 && p.warehouseStock<10).length} color="text-orange-500" icon={<Icon name="alert-triangle" size={14}/>} />
                                    <SummaryMiniCard label="Kho rỗng" value={globalProducts.filter(p=>p.warehouseStock===0).length} color="text-rose-500" />
                                </div>

                                <div className="bg-white rounded-[40px] border shadow-sm overflow-hidden p-2">
                                    <table className="w-full text-left text-sm border-separate border-spacing-y-1">
                                        <thead className="bg-slate-50/50 border-b">
                                            <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                <th className="px-10 py-6">Mô tả sản phẩm ↑↓</th>
                                                <th className="px-10 py-6 text-center">Mã SKU</th>
                                                <th className="px-10 py-6 text-center">Danh mục</th>
                                                <th className="px-10 py-6 text-center">Kho tổng ↑↓</th>
                                                <th className="px-10 py-6 text-center">Đơn giá</th>
                                                <th className="px-10 py-6 text-right pr-14">Quản lý</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {globalProducts.map(p => (
                                                <tr key={p.id} className="hover:bg-slate-50/50 transition-colors group rounded-2xl">
                                                    <td className="px-10 py-8 min-w-[300px] text-left">
                                                        <p className="font-black text-xl text-slate-800 mb-1 leading-none">{p.name}</p>
                                                        <p className="text-[11px] text-slate-400 line-clamp-1">{p.description || "Hàng hóa tiêu chuẩn"}</p>
                                                    </td>
                                                    <td className="px-10 py-8 text-xs font-mono font-bold text-slate-500 text-center uppercase">{p.sku}</td>
                                                    <td className="px-10 py-8 text-center">
                                                        <span className="inline-flex items-center px-4 py-1.5 bg-slate-100 rounded-full text-[10px] font-black text-slate-600 uppercase">
                                                            <span className="mr-2">{CATEGORIES[p.category] || '📦'}</span>{p.category}
                                                        </span>
                                                    </td>
                                                    <td className="px-10 py-8 text-center font-black">
                                                        <span className={`text-lg ${p.warehouseStock < 10 ? 'text-orange-500' : 'text-blue-600'}`}>{p.warehouseStock}</span>
                                                        <span className="text-[11px] text-slate-400 ml-1.5">{p.unit}</span>
                                                    </td>
                                                    <td className="px-10 py-8 font-black text-slate-800 text-center">{p.basePrice.toLocaleString()} đ</td>
                                                    <td className="px-10 py-8 pr-14 text-right">
                                                        <div className="flex justify-end gap-2">
                                                            <button onClick={() => handleImportToWarehouse(p.id, 10)} className="p-3 text-emerald-500 hover:bg-emerald-50 rounded-xl transition-all" title="Nhập hàng NCC"><Icon name="arrow-down-left" size={20}/></button>
                                                            <button onClick={() => { setSelectedStore(null); setShowModal('distribute'); }} className="p-3 text-orange-500 hover:bg-orange-50 rounded-xl transition-all" title="Điều phối chi nhánh"><Icon name="arrow-up-right" size={20}/></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* DETAILED STORE VIEW (Bổ sung nút Quay lại) */}
                        {currentStore && (activeTab === 'my-store' || selectedStore) && activeTab !== 'staff-global' && (
                            <div className="space-y-10 animate-fade-in text-left">
                                {user.role === 'admin' && (
                                    <button onClick={()=>setSelectedStore(null)} className="flex items-center text-[11px] font-black text-slate-400 hover:text-slate-900 transition-colors uppercase tracking-[0.2em] mb-6"><Icon name="chevron-left" size={14} className="mr-2"/> Quay lại danh mục chi nhánh</button>
                                )}
                                
                                <div className="bg-white p-12 rounded-[60px] border shadow-xl flex flex-col lg:flex-row justify-between items-start lg:items-center gap-10">
                                    <div className="flex items-center space-x-10">
                                        <div className="bg-blue-600 text-white p-10 rounded-[45px] shadow-2xl shadow-blue-200 flex items-center justify-center"><Icon name="store" size={56}/></div>
                                        <div>
                                            <h2 className="text-5xl font-black tracking-tight text-slate-900 mb-2 leading-none">{currentStore.name}</h2>
                                            <p className="text-slate-400 font-bold text-xl flex items-center mt-3"><Icon name="map-pin" size={24} className="mr-3 text-blue-500" /> {currentStore.location}</p>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-10 rounded-[50px] border border-slate-100 text-center min-w-[280px] shadow-inner">
                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-3">Hàng tại chi nhánh</p>
                                        <p className="text-6xl font-black text-blue-600 tracking-tighter">{currentStore.inventory.length} <span className="text-xl opacity-30">MÃ</span></p>
                                    </div>
                                </div>

                                <div className="flex space-x-2 bg-slate-100 w-fit p-2 rounded-3xl shadow-inner mb-8">
                                    <SubTabButton active={storeSubTab === 'inventory'} onClick={() => setStoreSubTab('inventory')} label="Mặt hàng" icon="package"/>
                                    <SubTabButton active={storeSubTab === 'employees'} onClick={() => setStoreSubTab('employees')} label="Nhân sự & Lịch trực" icon="users"/>
                                </div>

                                {storeSubTab === 'inventory' && (
                                    <div className="bg-white rounded-[40px] border overflow-hidden p-2">
                                        <table className="w-full text-sm border-separate border-spacing-y-2">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                                <tr><th className="px-10 py-6 text-left">Sản phẩm</th><th className="px-10 py-6 text-center">SKU</th><th className="px-10 py-6 text-center">Tồn kho</th><th className="px-10 py-6 text-center">Đã bán</th><th className="px-10 py-6 text-right pr-14">Giao dịch</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {currentStore.inventory.map(item => {
                                                    const info = getProductInfo(item.productId);
                                                    return (
                                                        <tr key={item.productId} className="hover:bg-blue-50/20 transition-all rounded-3xl group">
                                                            <td className="px-10 py-8 min-w-[300px] text-left"><p className="font-black text-xl text-slate-800 mb-1 leading-none">{info.name}</p><p className="text-[10px] text-slate-400 font-black uppercase tracking-widest leading-none">{info.category}</p></td>
                                                            <td className="px-10 py-8 font-mono font-bold text-slate-400 text-xs text-center">{info.sku}</td>
                                                            <td className="px-10 py-8 text-center font-black">
                                                                <span className={`px-6 py-2 rounded-full text-xs border-2 ${item.quantity < 5 ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-blue-50 text-blue-600 border-blue-100'}`}>{item.quantity} {info.unit}</span>
                                                            </td>
                                                            <td className="px-10 py-8 text-center"><span className="px-6 py-2 rounded-full bg-emerald-50 text-emerald-600 font-black text-xs border-2 border-emerald-100">+{item.sold || 0}</span></td>
                                                            <td className="px-10 py-8 text-right pr-14"><button onClick={() => handleSellProduct(currentStore.id, item.productId)} disabled={item.quantity === 0} className={`px-8 py-4 rounded-[20px] text-[11px] font-black uppercase tracking-widest transition-all shadow-xl active:scale-95 ${item.quantity > 0 ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-blue-100' : 'bg-slate-100 text-slate-300 cursor-not-allowed shadow-none'}`}>{item.quantity > 0 ? 'Xuất bán' : 'Hết hàng'}</button></td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                                
                                {storeSubTab === 'employees' && (
                                    <div className="bg-white rounded-[40px] border p-10 text-left">
                                        <div className="flex justify-between items-center mb-8">
                                            <h3 className="text-2xl font-black tracking-tight uppercase flex items-center gap-3 leading-none"><Icon name="clock" size={24} className="text-blue-600" /> Bảng phân ca trực tuần (4h)</h3>
                                            {user.role === 'admin' && (
                                                <button onClick={()=>{setEditingEmployee(null); setShowModal('addEmployee');}} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center shadow-lg active:scale-95 transition-all"><Icon name="user-plus" size={18} className="mr-2"/> Thêm nhân sự mới</button>
                                            )}
                                        </div>
                                        <div className="space-y-8">
                                            {currentStore.employees.map(e => (
                                                <div key={e.id} className="p-8 bg-slate-50 rounded-[40px] border border-transparent hover:border-blue-200 transition-all flex flex-col xl:flex-row gap-8 items-start xl:items-center relative group shadow-sm border-l-8 border-l-blue-600">
                                                    <div className="flex items-center gap-6 xl:w-[250px]">
                                                        <div className="w-16 h-16 rounded-[25px] bg-white text-blue-600 flex items-center justify-center font-black text-2xl shadow-sm uppercase border leading-none">{e.name.charAt(0)}</div>
                                                        <div><p className="font-black text-2xl text-slate-900 leading-none mb-2">{e.name}</p><span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase border tracking-widest ${e.role === 'Quản lý' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{e.role}</span></div>
                                                    </div>
                                                    <div className="flex-1 overflow-x-auto w-full no-scrollbar">
                                                        <div className="flex space-x-4 min-w-[700px]">
                                                            {DAYS_OF_WEEK.map(day => (
                                                                <div key={day.id} className="flex-1 min-w-[80px] text-center">
                                                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">{day.label}</p>
                                                                    <div className="space-y-1.5">
                                                                        {SHIFT_SLOTS.map(slot => {
                                                                            const isActive = e.schedule?.[day.id]?.includes(slot.id);
                                                                            return <div key={slot.id} className={`p-2 rounded-xl text-[9px] font-black border transition-all ${isActive ? 'bg-blue-600 text-white border-blue-600 shadow-md scale-105' : 'bg-white text-slate-200 border-slate-50 opacity-30 hover:opacity-100'}`} title={slot.time}>{slot.label}</div>
                                                                        })}
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    {user.role === 'admin' && (
                                                        <div className="flex xl:flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={()=>{setEditingEmployee(e); setShowModal('editEmployee');}} className="p-3 bg-white text-blue-500 rounded-xl shadow-sm border hover:bg-blue-500 hover:text-white transition-all"><Icon name="edit-2" size={18}/></button>
                                                            <button onClick={()=>handleDeleteEmployee(currentStore.id, e.id, e.name)} className="p-3 bg-white text-rose-500 rounded-xl shadow-sm border hover:bg-rose-500 hover:text-white transition-all"><Icon name="trash-2" size={18}/></button>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* MODALS */}
                    {showModal === 'confirmPopup' && pendingAction && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-white rounded-[50px] w-full max-w-md shadow-2xl overflow-hidden border border-slate-100 p-12 text-center space-y-8 animate-in zoom-in-95">
                                <div className={`w-24 h-24 rounded-[35px] flex items-center justify-center mx-auto shadow-inner ${pendingAction.type === 'delete' ? 'bg-rose-50 text-rose-500' : 'bg-blue-50 text-blue-600'} flex items-center justify-center`}>
                                    <Icon name={pendingAction.type === 'delete' ? 'alert-triangle' : 'help-circle'} size={48}/>
                                </div>
                                <div className="space-y-2">
                                    <h3 className="text-3xl font-black text-slate-900 uppercase tracking-tight leading-none">{pendingAction.title}</h3>
                                    <p className="text-slate-400 font-bold leading-relaxed">{pendingAction.message}</p>
                                </div>
                                <div className="flex gap-4 pt-4">
                                    <button onClick={() => { setShowModal(null); setPendingAction(null); }} className="flex-1 py-5 bg-slate-100 text-slate-500 rounded-[25px] font-black uppercase text-xs tracking-widest hover:bg-slate-200 transition-all">Quay lại</button>
                                    <button onClick={() => pendingAction.onConfirm()} className={`flex-1 py-5 text-white rounded-[25px] font-black uppercase text-xs tracking-widest shadow-xl transition-all ${pendingAction.type === 'delete' ? 'bg-rose-500 shadow-rose-100 hover:bg-rose-600' : 'bg-blue-600 shadow-blue-100 hover:bg-blue-700'}`}>Xác nhận</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showModal === 'addGlobalProduct' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[60px] w-full max-w-2xl shadow-2xl overflow-hidden border animate-in zoom-in-95">
                                <div className="p-10 border-b flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-2xl font-black text-slate-900 uppercase tracking-tight text-left leading-none">Thêm sản phẩm hệ thống</h3>
                                    <button onClick={()=>setShowModal(null)} className="p-4 hover:bg-slate-200 rounded-3xl transition-all text-slate-400 flex items-center justify-center"><Icon name="x" size={28}/></button>
                                </div>
                                <form className="p-10 space-y-8" onSubmit={(e)=>{
                                    e.preventDefault(); const fd = new FormData(e.target);
                                    handleSaveGlobalProduct({
                                        sku: fd.get('sku'), name: fd.get('name'), category: fd.get('category'), 
                                        basePrice: fd.get('price'), initialStock: fd.get('stock'), unit: fd.get('unit'), description: fd.get('desc')
                                    });
                                }}>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                        <Input label="Mã SKU" name="sku" required placeholder="Ví dụ: SP-001" />
                                        <Input label="Tên sản phẩm" name="name" required placeholder="Tên hàng hóa..." />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 text-left">
                                        <Select label="Phân loại" name="category" required>
                                            {Object.keys(CATEGORIES).map(c => <option key={c} value={c}>{c}</option>)}
                                        </Select>
                                        <Input label="Đơn vị tính" name="unit" required placeholder="cái, bao..." />
                                        <Input label="Giá vốn niêm yết" name="price" type="number" required placeholder="VNĐ" />
                                    </div>
                                    <Input label="Mô tả hàng hóa" name="desc" placeholder="Thông tin chi tiết sản phẩm..." />
                                    <Input label="Số lượng thực nhập đầu kỳ" name="stock" type="number" defaultValue="0" />
                                    <button type="submit" className="w-full py-6 bg-blue-600 text-white rounded-[30px] font-black shadow-2xl hover:bg-blue-700 uppercase text-[11px] tracking-widest transition-all active:scale-95 leading-none">Khai báo danh mục</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {(showModal === 'addEmployee' || showModal === 'editEmployee') && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[60px] w-full max-w-4xl shadow-2xl overflow-hidden border animate-in zoom-in-95">
                                <div className="p-10 border-b flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-2xl font-black text-slate-900 uppercase tracking-tight text-left leading-none">{showModal === 'addEmployee' ? 'Đăng ký nhân sự' : 'Cập nhật nhân sự'}</h3>
                                    <button onClick={()=>{setShowModal(null); setEditingEmployee(null);}} className="p-4 hover:bg-slate-200 rounded-3xl transition-all text-slate-400 flex items-center justify-center"><Icon name="x" size={28}/></button>
                                </div>
                                <EmployeeForm initialData={editingEmployee} onSave={(data) => handleSaveEmployee(currentStore?.id, data)} onCancel={() => { setShowModal(null); setEditingEmployee(null); }} />
                            </div>
                        </div>
                    )}

                    {showModal === 'addStore' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[50px] w-full max-w-md shadow-2xl overflow-hidden border animate-in zoom-in-95">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-xl font-black text-slate-900 uppercase tracking-tight text-left leading-none">Mở chi nhánh mới</h3>
                                    <button onClick={()=>setShowModal(null)} className="p-4 hover:bg-slate-200 rounded-2xl transition-all text-slate-400 flex items-center justify-center"><Icon name="x" size={24}/></button>
                                </div>
                                <form className="p-8 space-y-6" onSubmit={(e)=>{ e.preventDefault(); const fd = new FormData(e.target); handleAddStore({ name: fd.get('name'), location: fd.get('location') }); }}>
                                    <Input label="Tên chi nhánh" name="name" required placeholder="Cửa hàng Quận..." />
                                    <Input label="Địa chỉ cụ thể" name="location" required placeholder="Số 123..." />
                                    <button type="submit" className="w-full py-5 bg-blue-600 text-white rounded-[30px] font-black shadow-lg hover:bg-blue-700 uppercase text-[11px] tracking-widest transition-all active:scale-95 leading-none">Kích hoạt ngay</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showModal === 'distribute' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[50px] w-full max-w-md shadow-2xl overflow-hidden border animate-in zoom-in-95">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50">
                                    <h3 className="text-xl font-black text-slate-900 uppercase tracking-tight text-left leading-none">Điều phối kho hàng</h3>
                                    <button onClick={()=>setShowModal(null)} className="p-4 hover:bg-slate-200 rounded-2xl transition-all text-slate-400 flex items-center justify-center"><Icon name="x" size={24}/></button>
                                </div>
                                <form className="p-8 space-y-6" onSubmit={(e)=>{ e.preventDefault(); const fd = new FormData(e.target); handleDistribute(fd.get('sid'), fd.get('pid'), fd.get('qty')); }}>
                                    <Select label="Chi nhánh đích" name="sid" defaultValue={currentStore?.id}>
                                        <option value="">-- Chọn điểm đến --</option>
                                        {stores.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </Select>
                                    <Select label="Mặt hàng luân chuyển" name="pid">
                                        <option value="">-- Chọn mặt hàng --</option>
                                        {globalProducts.map(p => <option key={p.id} value={p.id}>{p.name} (Tồn tổng: {p.warehouseStock})</option>)}
                                    </Select>
                                    <Input label="Số lượng xuất kho" name="qty" type="number" required min="1" />
                                    <button type="submit" className="w-full py-5 bg-blue-600 text-white rounded-[30px] font-black shadow-lg hover:bg-blue-700 uppercase text-[11px] tracking-widest leading-none">Chuyển kho tức thì</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const EmployeeForm = ({ initialData, onSave, onCancel }) => {
            const [data, setData] = useState(initialData || { name: '', role: 'Nhân viên', phone: '', username: '', password: '' });
            const [schedule, setSchedule] = useState(initialData?.schedule || { Mon: [], Tue: [], Wed: [], Thu: [], Fri: [], Sat: [], Sun: [] });
            
            const toggleShift = (day, shiftId) => {
                const dayShifts = schedule[day];
                const newShifts = dayShifts.includes(shiftId) ? dayShifts.filter(s => s !== shiftId) : [...dayShifts, shiftId];
                setSchedule({ ...schedule, [day]: newShifts });
            };

            return (
                <form className="p-10 space-y-10 max-h-[80vh] overflow-y-auto" onSubmit={(e)=>{ e.preventDefault(); onSave({...data, schedule}); }}>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div className="space-y-6 text-left">
                            <h4 className="text-xs font-black text-blue-600 uppercase tracking-[0.3em] border-l-4 border-blue-600 pl-4">Hồ sơ cá nhân</h4>
                            <Input label="Họ và tên" required value={data.name} onChange={v => setData({...data, name: v})} />
                            <Input label="Liên hệ (SĐT)" required value={data.phone} onChange={v => setData({...data, phone: v})} />
                            <Select label="Chức danh" value={data.role} onChange={v => setData({...data, role: v})}><option value="Quản lý">Quản lý</option><option value="Nhân viên">Nhân viên</option></Select>
                        </div>
                        <div className="space-y-6 text-left">
                            <h4 className="text-xs font-black text-blue-600 uppercase tracking-[0.3em] border-l-4 border-blue-600 pl-4">Thông tin đăng nhập</h4>
                            <Input label="Username" required value={data.username} onChange={v => setData({...data, username: v})} />
                            <Input label="Password" type="password" required value={data.password} onChange={v => setData({...data, password: v})} />
                        </div>
                    </div>
                    <div className="space-y-6 text-left">
                        <h4 className="text-xs font-black text-blue-600 uppercase tracking-[0.3em] border-l-4 border-blue-600 pl-4">Ma trận ca trực tuần</h4>
                        <div className="bg-slate-50 p-8 rounded-[45px] border shadow-inner overflow-x-auto no-scrollbar">
                            <div className="flex space-x-4 min-w-[750px]">
                                {DAYS_OF_WEEK.map(day => (
                                    <div key={day.id} className="flex-1 space-y-4">
                                        <p className="text-center font-black text-xs text-slate-500 uppercase tracking-widest">{day.label}</p>
                                        <div className="space-y-2">
                                            {SHIFT_SLOTS.map(slot => (
                                                <button key={slot.id} type="button" onClick={() => toggleShift(day.id, slot.id)} className={`w-full py-4 rounded-2xl text-[10px] font-black border-2 transition-all ${schedule[day.id].includes(slot.id) ? 'bg-blue-600 text-white border-blue-600 shadow-md scale-105' : 'bg-white text-slate-300 border-slate-100 hover:border-blue-200'}`}>{slot.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="pt-6 flex gap-6">
                        <button type="button" onClick={onCancel} className="flex-1 py-6 font-black text-slate-400 uppercase text-xs hover:text-slate-900 transition-colors">Đóng cửa sổ</button>
                        <button type="submit" className="flex-[2] py-6 bg-blue-600 text-white rounded-[30px] font-black shadow-2xl hover:bg-blue-700 uppercase text-xs active:scale-95 transition-all">Ghi nhận hồ sơ</button>
                    </div>
                </form>
            );
        };

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
