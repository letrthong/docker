<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết kế Nhãn Bao bì - Nong Phu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel để chạy JSX trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas để xuất ảnh -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @media print {
            @page { size: landscape; margin: 0; }
            .no-print { display: none !important; }
            .print-area { margin: 0 !important; box-shadow: none !important; border: none !important; }
        }
        body { font-family: 'Inter', sans-serif; }
        .color-picker-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker-input::-webkit-color-swatch { border: none; border-radius: 50%; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [labelData, setLabelData] = useState({
                brandName: 'Nong Phu',
                productName: 'CÁ TRÊ AQUAPONICS',
                productSubName: 'PHI LÊ SẤY LẠNH',
                englishName: 'Freeze-Dried Aquaponics Catfish Fillet',
                ingredients: '100% Cá trê sạch vỗ béo bằng rau xanh, gia vị tự nhiên.',
                storage: 'Nơi khô ráo, thoáng mát, tránh ánh nắng trực tiếp.',
                usage: 'Dùng ăn trực tiếp hoặc chế biến món ăn tùy thích.',
                expiry: '12 tháng kể từ ngày sản xuất.',
                website: 'www.nongphu.com.vn',
                weight: '100g',
                barcode: '8936000000001',
                // Toàn bộ màu sắc nằm trong config này
                bgColor: '#00AEEF',
                textColor: '#FFFFFF',
                accentColor: '#FDE047' 
            });

            const labelRef = useRef(null);
            const fileInputRef = useRef(null);

            // Cập nhật presets bao gồm cả màu nhấn để đồng bộ
            const presets = [
                { bg: '#00AEEF', text: '#FFFFFF', accent: '#FDE047', name: 'Xanh dương' },
                { bg: '#16A34A', text: '#FFFFFF', accent: '#BEF264', name: 'Xanh lá' },
                { bg: '#DC2626', text: '#FFFFFF', accent: '#FCA5A5', name: 'Đỏ' },
                { bg: '#F59E0B', text: '#FFFFFF', accent: '#FEF3C7', name: 'Cam' },
                { bg: '#111827', text: '#FFFFFF', accent: '#9CA3AF', name: 'Đen' },
                { bg: '#FFFFFF', text: '#1E293B', accent: '#3B82F6', name: 'Trắng' }
            ];

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setLabelData(prev => ({ ...prev, [name]: value }));
            };

            const handlePrint = () => {
                window.print();
            };

            const handleDownloadImage = async () => {
                try {
                    const canvas = await html2canvas(labelRef.current, {
                        scale: 3,
                        useCORS: true,
                        backgroundColor: null
                    });
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = image;
                    link.download = `${labelData.productName.replace(/\s+/g, '_')}_label.png`;
                    link.click();
                } catch (error) {
                    console.error("Lỗi xuất ảnh:", error);
                }
            };

            const handleDownloadConfig = () => {
                // Đảm bảo mọi màu sắc hiện tại được đóng gói vào JSON
                const dataStr = JSON.stringify(labelData, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
                const link = document.createElement('a');
                link.href = dataUri;
                link.download = `${labelData.productName.replace(/\s+/g, '_')}_config.json`;
                link.click();
            };

            const handleUploadConfig = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const json = JSON.parse(e.target.result);
                            // Ghi đè toàn bộ dữ liệu từ JSON vào state
                            setLabelData(prev => ({ ...prev, ...json }));
                        } catch (err) { 
                            console.error("Lỗi đọc JSON:", err);
                            alert("File JSON không hợp lệ hoặc bị lỗi.");
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const changeTheme = (preset) => {
                setLabelData(prev => ({ 
                    ...prev, 
                    bgColor: preset.bg, 
                    textColor: preset.text,
                    accentColor: preset.accent 
                }));
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-gray-100">
                    {/* Sidebar */}
                    <div className="w-full md:w-1/3 bg-white p-6 shadow-xl no-print overflow-y-auto max-h-screen border-r">
                        <div className="flex items-center justify-between mb-6">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-2 rounded-lg text-white shadow-lg">
                                    <Icon name="palette" />
                                </div>
                                <h1 className="text-xl font-bold text-gray-800 tracking-tight leading-none">Thiết kế<br/>Nhãn</h1>
                            </div>
                            <div className="flex gap-2">
                                <button 
                                    onClick={handleDownloadConfig} 
                                    className="flex flex-col items-center justify-center p-2 border rounded-lg hover:bg-gray-50 transition-colors group min-w-[50px]" 
                                    title="Lưu cấu hình (JSON)"
                                >
                                    <Icon name="save" className="text-gray-600 group-hover:text-blue-600" />
                                    <span className="text-[10px] font-bold text-gray-400 group-hover:text-blue-600 mt-1">LƯU</span>
                                </button>
                                <button 
                                    onClick={() => fileInputRef.current.click()} 
                                    className="flex flex-col items-center justify-center p-2 border rounded-lg hover:bg-gray-50 transition-colors group min-w-[50px]" 
                                    title="Mở cấu hình (JSON)"
                                >
                                    <Icon name="folder-open" className="text-gray-600 group-hover:text-blue-600" />
                                    <span className="text-[10px] font-bold text-gray-400 group-hover:text-blue-600 mt-1">MỞ</span>
                                </button>
                                <input type="file" ref={fileInputRef} onChange={handleUploadConfig} className="hidden" accept=".json" />
                            </div>
                        </div>

                        <div className="space-y-6">
                            {/* Group Màu Sắc */}
                            <section className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                <label className="text-xs font-black text-gray-400 uppercase mb-3 block tracking-widest">Màu sắc (Config)</label>
                                <div className="flex flex-wrap gap-3 mb-4">
                                    {presets.map((p, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => changeTheme(p)}
                                            className={`w-10 h-10 rounded-full border-2 transition-transform hover:scale-110 shadow-sm ${labelData.bgColor === p.bg ? 'border-blue-500 ring-2 ring-blue-200 ring-offset-1' : 'border-white'}`}
                                            style={{ backgroundColor: p.bg }}
                                            title={p.name}
                                        />
                                    ))}
                                    <div className="relative group">
                                        <input 
                                            type="color" 
                                            value={labelData.bgColor}
                                            onChange={(e) => setLabelData(prev => ({...prev, bgColor: e.target.value}))}
                                            className="w-10 h-10 rounded-full cursor-pointer opacity-0 absolute inset-0 z-10"
                                        />
                                        <div className="w-10 h-10 rounded-full border-2 border-dashed border-gray-400 flex items-center justify-center bg-white text-gray-400 group-hover:border-blue-500 group-hover:text-blue-500">
                                            <Icon name="plus" size={16} />
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 uppercase">Nền</label>
                                        <input 
                                            type="color" 
                                            value={labelData.bgColor}
                                            onChange={(e) => setLabelData(prev => ({...prev, bgColor: e.target.value}))}
                                            className="w-full h-8 mt-1 block cursor-pointer rounded overflow-hidden border-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 uppercase">Chữ</label>
                                        <input 
                                            type="color" 
                                            value={labelData.textColor}
                                            onChange={(e) => setLabelData(prev => ({...prev, textColor: e.target.value}))}
                                            className="w-full h-8 mt-1 block cursor-pointer rounded overflow-hidden border-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 uppercase">Nhấn</label>
                                        <input 
                                            type="color" 
                                            value={labelData.accentColor}
                                            onChange={(e) => setLabelData(prev => ({...prev, accentColor: e.target.value}))}
                                            className="w-full h-8 mt-1 block cursor-pointer rounded overflow-hidden border-none"
                                        />
                                    </div>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Thương hiệu</label>
                                    <input name="brandName" value={labelData.brandName} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Tên sản phẩm</label>
                                    <input name="productName" value={labelData.productName} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 font-bold focus:ring-2 focus:ring-blue-500 outline-none uppercase" />
                                    <input name="productSubName" value={labelData.productSubName} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-2 text-blue-600 font-semibold focus:ring-2 focus:ring-blue-500 outline-none" />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase">Khối lượng</label>
                                        <input name="weight" value={labelData.weight} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase">Hạn dùng</label>
                                        <input name="expiry" value={labelData.expiry} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                </div>
                            </section>

                            <div className="pt-4 flex flex-col gap-3">
                                <button onClick={handleDownloadImage} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md transition-all active:scale-95">
                                    <Icon name="image" /> Lưu Hình Ảnh (PNG)
                                </button>
                                <button onClick={handlePrint} className="w-full bg-gray-800 hover:bg-black text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md transition-all active:scale-95">
                                    <Icon name="printer" /> In Nhãn Ngay
                                </button>
                                <button onClick={() => window.location.reload()} className="text-sm text-gray-400 py-2 hover:text-gray-600 text-center">Xóa hết & Làm lại</button>
                            </div>
                        </div>
                    </div>

                    {/* Preview Area */}
                    <div className="flex-1 p-8 flex items-center justify-center overflow-auto bg-gray-200">
                        <div ref={labelRef} className="print-area bg-white shadow-2xl relative" style={{ width: '600px', height: '400px', minWidth: '600px' }}>
                            <div 
                                className="h-full w-full relative p-8 flex flex-col items-center border-8 border-white/20 overflow-hidden transition-all duration-500"
                                style={{ backgroundColor: labelData.bgColor, color: labelData.textColor }}
                            >
                                
                                <div className="w-full flex justify-between items-start mb-2 relative z-10">
                                    <div className="flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full backdrop-blur-sm border border-white/10">
                                        <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-md" style={{ color: labelData.bgColor }}>
                                            <Icon name="fish" fill="currentColor" size={24} />
                                        </div>
                                        <span className="font-black text-2xl tracking-tighter uppercase leading-none">{labelData.brandName}</span>
                                    </div>
                                    <div className="text-[10px] font-black text-right opacity-80 uppercase leading-none tracking-widest">
                                        Premium Quality<br/>Organic Farmed
                                    </div>
                                </div>

                                <div className="flex-1 w-full grid grid-cols-12 gap-4 mt-4 relative z-10">
                                    <div className="col-span-3 border-r border-white/20 pr-4 flex flex-col justify-center gap-6">
                                        <div className="text-[10px]">
                                            <p className="font-black uppercase mb-1" style={{ color: labelData.accentColor }}>Kiểm định</p>
                                            <p className="opacity-90 leading-tight">Đạt chuẩn VietGAP, an toàn tuyệt đối.</p>
                                        </div>
                                        <div className="text-[10px]">
                                            <p className="font-black uppercase mb-1" style={{ color: labelData.accentColor }}>Xuất xứ</p>
                                            <p className="opacity-90 leading-tight">Trang trại Aquaponics CNC Việt Nam.</p>
                                        </div>
                                    </div>

                                    <div className="col-span-6 flex flex-col items-center justify-center text-center px-2">
                                        <div className="bg-white px-5 py-6 rounded-2xl shadow-2xl border-4 border-black/5 w-full transform -rotate-1 transition-all">
                                            <h2 className="text-3xl font-black mb-1 leading-none tracking-tighter text-gray-900 uppercase">{labelData.productName}</h2>
                                            <div className="h-1 bg-gray-100 my-2 w-2/3 mx-auto rounded-full"></div>
                                            <h3 className="text-xl font-extrabold text-blue-600">{labelData.productSubName}</h3>
                                            <div className="h-14 flex items-center justify-center opacity-10 my-1">
                                                <Icon name="waves" size={50} className="text-gray-900" />
                                            </div>
                                            <p className="text-[10px] uppercase italic opacity-40 font-black tracking-widest leading-none">{labelData.englishName}</p>
                                        </div>
                                    </div>

                                    <div className="col-span-3 border-l border-white/20 pl-4 flex flex-col justify-center gap-4 text-right">
                                        <div className="text-[10px]">
                                            <p className="font-black uppercase mb-1" style={{ color: labelData.accentColor }}>Thành phần</p>
                                            <p className="opacity-90 leading-tight">{labelData.ingredients}</p>
                                        </div>
                                        <div className="text-[10px]">
                                            <p className="font-black uppercase mb-1" style={{ color: labelData.accentColor }}>Hạn dùng</p>
                                            <p className="opacity-90 leading-tight">{labelData.expiry}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full mt-4 flex justify-between items-end border-t border-white/20 pt-3 relative z-10">
                                    <div className="flex flex-col gap-2">
                                        <div className="text-[11px] font-black italic opacity-80 leading-none">{labelData.website}</div>
                                        <div className="bg-white text-gray-900 px-3 py-1 rounded-lg text-xs font-black w-fit shadow-md border border-black/5">
                                            NET WT: {labelData.weight}
                                        </div>
                                    </div>
                                    <div className="bg-white p-2 rounded-xl shadow-inner flex flex-col items-center border border-black/5">
                                        <div className="h-8 w-28 flex items-end gap-0.5 bg-gray-50 px-1 rounded overflow-hidden">
                                            {[...Array(24)].map((_, i) => (
                                                <div key={i} className="bg-gray-800" style={{ width: i%3==0 ? '2px' : '1px', height: `${Math.random()*40 + 60}%` }}></div>
                                            ))}
                                        </div>
                                        <span className="text-[8px] text-gray-800 font-mono tracking-tighter mt-1">{labelData.barcode}</span>
                                    </div>
                                </div>

                                {/* Các họa tiết trang trí nền (Glassmorphism) */}
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -mr-32 -mt-32"></div>
                                <div className="absolute bottom-0 left-0 w-48 h-48 bg-black/10 rounded-full blur-3xl -ml-24 -mb-24"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
