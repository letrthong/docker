<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết kế Nhãn Bao bì - Nong Phu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel để chạy JSX trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas để xuất ảnh -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @media print {
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
                width: 100vw !important;
                height: 100vh !important;
                overflow: hidden !important; 
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print { 
                display: none !important; 
            }
            #root {
                margin: 0 !important;
                display: block !important;
            }
            .print-area * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                visibility: visible !important;
                opacity: 1 !important;
            }
            .print-no-transform {
                filter: none !important;
                backdrop-filter: none !important;
            }
            .decorative-shape {
                display: none !important; 
            }
            .main-product-card {
                background-color: #ffffff !important;
                border: 1px solid #eee !important;
                box-shadow: none !important;
            }
        }
        body { font-family: 'Inter', sans-serif; }
        .color-picker-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker-input::-webkit-color-swatch { border: none; border-radius: 50%; }
        
        .preview-box {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, size = 20, className = "", fill = "none" }) => {
            const spanRef = useRef(null);

            useEffect(() => {
                if (window.lucide && spanRef.current) {
                    spanRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    spanRef.current.appendChild(i);
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: { width: size, height: size, fill: fill }
                    });
                }
            }, [name, size, fill]);

            return (
                <span 
                    ref={spanRef} 
                    className={className} 
                    style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size }}
                ></span>
            );
        };

        const App = () => {
            const [labelData, setLabelData] = useState({
                brandName: 'Nong Phu',
                logoUrl: null, 
                productName: 'CÁ TRÊ AQUAPONICS',
                productSubName: 'PHI LÊ SẤY LẠNH',
                englishName: 'Freeze-Dried Aquaponics Catfish Fillet',
                ingredients: '100% Cá trê sạch vỗ béo bằng rau xanh, gia vị tự nhiên.',
                storage: 'Nơi khô ráo, thoáng mát, tránh ánh nắng trực tiếp.',
                usage: 'Dùng ăn trực tiếp hoặc chế biến món ăn tùy thích.',
                expiry: '12 tháng kể từ ngày sản xuất.',
                website: 'www.nongphu.com.vn',
                weight: '100g',
                barcode: '8936000000001',
                bgColor: '#00AEEF',
                textColor: '#FFFFFF',
                accentColor: '#FDE047',
                printSize: 'A4' 
            });

            const labelRef = useRef(null);
            const fileInputRef = useRef(null);
            const logoInputRef = useRef(null); 

            const presets = [
                { bg: '#00AEEF', text: '#FFFFFF', accent: '#FDE047', name: 'Xanh dương' },
                { bg: '#16A34A', text: '#FFFFFF', accent: '#BEF264', name: 'Xanh lá' },
                { bg: '#DC2626', text: '#FFFFFF', accent: '#FCA5A5', name: 'Đỏ' },
                { bg: '#F59E0B', text: '#FFFFFF', accent: '#FEF3C7', name: 'Cam' },
                { bg: '#111827', text: '#FFFFFF', accent: '#9CA3AF', name: 'Đen' },
                { bg: '#FFFFFF', text: '#1E293B', accent: '#3B82F6', name: 'Trắng' }
            ];

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setLabelData(prev => ({ ...prev, [name]: value }));
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                const inputElement = e.target; // Lưu lại reference của input
                
                if (file) {
                    // CẢNH BÁO CHỐNG CRASH: Khống chế dung lượng < 5MB
                    if (file.size > 5 * 1024 * 1024) {
                        alert("Kích thước ảnh quá lớn! Vui lòng chọn ảnh dưới 5MB để tránh quá tải trình duyệt.");
                        inputElement.value = null;
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setLabelData(prev => ({ ...prev, logoUrl: event.target.result }));
                        inputElement.value = null; // Reset input sau khi nạp xong
                    };
                    reader.readAsDataURL(file);
                } else {
                    inputElement.value = null;
                }
            };

            const removeLogo = () => {
                setLabelData(prev => ({ ...prev, logoUrl: null }));
            };

            const handlePrint = () => {
                window.print();
            };

            const handleDownloadImage = async () => {
                try {
                    const canvas = await html2canvas(labelRef.current, {
                        scale: 3,
                        useCORS: true,
                        backgroundColor: null
                    });
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = image;
                    link.download = `${labelData.productName.replace(/\s+/g, '_')}_label.png`;
                    link.click();
                } catch (error) {
                    console.error("Lỗi xuất ảnh:", error);
                }
            };

            const handleDownloadConfig = () => {
                const dataStr = JSON.stringify(labelData, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
                const link = document.createElement('a');
                link.href = dataUri;
                link.download = `${labelData.productName.replace(/\s+/g, '_')}_config.json`;
                link.click();
            };

            const handleUploadConfig = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const json = JSON.parse(e.target.result);
                            setLabelData(prev => ({ ...prev, ...json }));
                        } catch (err) { 
                            alert("File JSON không hợp lệ.");
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const changeTheme = (preset) => {
                setLabelData(prev => ({ 
                    ...prev, 
                    bgColor: preset.bg, 
                    textColor: preset.text,
                    accentColor: preset.accent 
                }));
            };

            const getPrintScale = () => {
                switch(labelData.printSize) {
                    case 'A4': return 1.7;   
                    case 'A5': return 1.2;   
                    case 'A6': return 0.85;  
                    default: return 1;       
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-gray-100">
                    <style>{`
                        @media print {
                            @page { 
                                size: ${labelData.printSize === 'auto' ? 'auto' : labelData.printSize + ' landscape'}; 
                                margin: 0; 
                            }
                            .print-area {
                                box-shadow: none !important; 
                                border: none !important; 
                                width: 600px !important; 
                                height: 400px !important;
                                min-width: 600px !important;
                                min-height: 400px !important;
                                position: fixed !important;
                                top: 50% !important;
                                left: 50% !important;
                                margin: 0 !important;
                                transform: translate(-50%, -50%) scale(${getPrintScale()}) !important;
                                transform-origin: center center !important;
                                overflow: hidden !important;
                                -webkit-print-color-adjust: exact !important;
                                print-color-adjust: exact !important;
                            }
                        }
                    `}</style>

                    {/* Sidebar Control Panel */}
                    <div className="w-full md:w-1/3 bg-white p-6 shadow-xl no-print overflow-y-auto max-h-screen border-r z-20">
                        <div className="flex items-center justify-between mb-6">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-2 rounded-lg text-white shadow-lg">
                                    <Icon name="palette" />
                                </div>
                                <h1 className="text-xl font-bold text-gray-800 tracking-tight leading-none">Thiết kế<br/>Nhãn</h1>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleDownloadConfig} className="p-2 border rounded-lg hover:bg-gray-50 transition-colors" title="Lưu JSON">
                                    <Icon name="save" className="text-gray-600" />
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="p-2 border rounded-lg hover:bg-gray-50 transition-colors" title="Mở JSON">
                                    <Icon name="folder-open" className="text-gray-600" />
                                </button>
                                <input type="file" ref={fileInputRef} onChange={handleUploadConfig} className="hidden" accept=".json" />
                            </div>
                        </div>

                        <div className="space-y-6">
                            <section className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                <label className="text-xs font-black text-gray-400 uppercase mb-3 block tracking-widest">Màu sắc</label>
                                <div className="flex flex-wrap gap-2 mb-4">
                                    {presets.map((p, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => changeTheme(p)}
                                            className={`w-8 h-8 rounded-full border-2 transition-transform hover:scale-110 ${labelData.bgColor === p.bg ? 'border-blue-500 ring-2 ring-blue-100' : 'border-white'}`}
                                            style={{ backgroundColor: p.bg }}
                                        />
                                    ))}
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <div className="flex flex-col gap-1">
                                        <span className="text-[10px] text-gray-400 font-bold uppercase">Nền</span>
                                        <input type="color" value={labelData.bgColor} onChange={(e) => setLabelData(prev => ({...prev, bgColor: e.target.value}))} className="w-full h-8 cursor-pointer rounded border-none" />
                                    </div>
                                    <div className="flex flex-col gap-1">
                                        <span className="text-[10px] text-gray-400 font-bold uppercase">Chữ</span>
                                        <input type="color" value={labelData.textColor} onChange={(e) => setLabelData(prev => ({...prev, textColor: e.target.value}))} className="w-full h-8 cursor-pointer rounded border-none" />
                                    </div>
                                    <div className="flex flex-col gap-1">
                                        <span className="text-[10px] text-gray-400 font-bold uppercase">Nhấn</span>
                                        <input type="color" value={labelData.accentColor} onChange={(e) => setLabelData(prev => ({...prev, accentColor: e.target.value}))} className="w-full h-8 cursor-pointer rounded border-none" />
                                    </div>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Logo Thương hiệu</label>
                                    <div className="flex items-center gap-2 mt-1">
                                        <input 
                                            type="file" 
                                            ref={logoInputRef} 
                                            onChange={handleLogoUpload} 
                                            className="hidden" 
                                            accept="image/*" 
                                        />
                                        <button 
                                            onClick={() => logoInputRef.current.click()} 
                                            className="px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors flex-1 flex items-center justify-center gap-2"
                                        >
                                            <Icon name="upload" size={16} /> Tải Logo Mới
                                        </button>
                                        
                                        {/* FIX: Thay vì Unmount, ta ẩn bằng CSS display để tránh lỗi của React */}
                                        <button 
                                            onClick={removeLogo} 
                                            className="p-2 bg-red-50 text-red-500 border border-red-100 rounded-lg hover:bg-red-100 transition-colors"
                                            title="Xóa Logo"
                                            style={{ display: labelData.logoUrl ? 'flex' : 'none' }}
                                        >
                                            <Icon name="trash-2" size={16} />
                                        </button>
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Tên thương hiệu</label>
                                    <input name="brandName" value={labelData.brandName} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Sản phẩm chính</label>
                                    <input name="productName" value={labelData.productName} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 font-bold focus:ring-2 focus:ring-blue-500 outline-none uppercase" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase">Mô tả phụ</label>
                                    <input name="productSubName" value={labelData.productSubName} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase">Khối lượng</label>
                                        <input name="weight" value={labelData.weight} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase">Hạn dùng</label>
                                        <input name="expiry" value={labelData.expiry} onChange={handleInputChange} className="w-full p-2 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                </div>
                            </section>

                            <section className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <label className="text-xs font-bold text-blue-800 uppercase mb-2 block tracking-widest flex items-center gap-1">
                                    <Icon name="settings" size={14} /> Tùy chọn in
                                </label>
                                <select 
                                    name="printSize" 
                                    value={labelData.printSize} 
                                    onChange={handleInputChange} 
                                    className="w-full p-2 border-blue-200 border rounded-lg text-sm text-blue-900 focus:ring-2 focus:ring-blue-500 outline-none bg-white font-medium"
                                >
                                    <option value="A4">Toàn trang A4 (Siêu lớn)</option>
                                    <option value="A5">Khổ 1/2 A4 (A5 - Vừa)</option>
                                    <option value="A6">Khổ 1/4 A4 (A6 - Nhỏ)</option>
                                    <option value="auto">Kích thước chuẩn (600x400px)</option>
                                </select>
                            </section>

                            <div className="pt-2 space-y-3">
                                <button onClick={handleDownloadImage} className="w-full bg-gray-800 hover:bg-gray-900 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-md">
                                    <Icon name="image" /> Tải ảnh PNG
                                </button>
                                <button onClick={handlePrint} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg ring-4 ring-blue-600/30">
                                    <Icon name="printer" /> In Nhãn Ngay
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Preview Area */}
                    <div className="flex-1 p-8 flex items-center justify-center overflow-auto bg-gray-200 min-h-[500px]">
                        <div ref={labelRef} className="print-area preview-box bg-white relative overflow-hidden" style={{ width: '600px', height: '400px' }}>
                            <div 
                                className="h-full w-full relative p-5 flex flex-col justify-between border-8 border-white/20"
                                style={{ backgroundColor: labelData.bgColor, color: labelData.textColor }}
                            >
                                {/* Header */}
                                <div className="w-full flex justify-between items-start relative z-50 print-no-transform">
                                    <div className="flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full border border-white/10 print-no-transform">
                                        <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-md overflow-hidden shrink-0" style={{ color: labelData.bgColor }}>
                                            
                                            {/* FIX: Không dùng điều kiện IF để tránh lỗi React removeChild. Dùng display: none/block */}
                                            <img 
                                                src={labelData.logoUrl || ''} 
                                                alt="Logo" 
                                                className="w-full h-full object-cover" 
                                                style={{ display: labelData.logoUrl ? 'block' : 'none' }} 
                                            />
                                            <div style={{ display: labelData.logoUrl ? 'none' : 'flex' }}>
                                                <Icon name="fish" fill="currentColor" size={24} />
                                            </div>
                                            
                                        </div>
                                        <span className="font-black text-2xl tracking-tighter uppercase leading-none">{labelData.brandName}</span>
                                    </div>
                                    <div className="text-[10px] font-black text-right opacity-80 uppercase leading-none tracking-widest">
                                        Premium Quality<br/>Organic Farmed
                                    </div>
                                </div>

                                {/* Main Content Grid */}
                                <div className="w-full grid grid-cols-12 gap-4 relative z-50 print-no-transform items-center">
                                    <div className="col-span-3 border-r border-white/20 pr-4 flex flex-col justify-center gap-5">
                                        <div className="text-[10px]">
                                            <p className="font-black uppercase mb-1" style={{ color: labelData.accentColor }}>Kiểm định</p>
                                            <p className="opacity-90 leading-tight">Đạt chuẩn VietGAP, an toàn cho gia đình.</p>
                                        </div>
                                        <div className="text-[10px]">
                                            <p className="font-black uppercase mb-1" style={{ color: labelData.accentColor }}>Xuất xứ</p>
                                            <p className="opacity-90 leading-tight">Trang trại Aquaponics Việt Nam.</p>
                                        </div>
                                    </div>

                                    <div className="col-span-6 flex flex-col items-center justify-center text-center px-2">
                                        <div className="main-product-card bg-white px-5 py-4 rounded-2xl shadow-2xl border-4 border-black/5 w-full transform -rotate-1 print-no-transform">
                                            <h2 className="text-3xl font-black mb-1 leading-none tracking-tighter text-gray-900 uppercase">{labelData.productName}</h2>
                                            <div className="h-1 bg-gray-100 my-2 w-2/3 mx-auto rounded-full"></div>
                                            <h3 className="text-xl font-extrabold text-blue-600">{labelData.productSubName}</h3>
                                            <div className="h-10 flex items-center justify-center opacity-10 my-1">
                                                <Icon name="waves" size={40} className="text-gray-900" />
                                            </div>
                                            <p className="text-[9px] uppercase italic opacity-40 font-black tracking-widest leading-none">{labelData.englishName}</p>
                                        </div>
                                    </div>

                                    <div className="col-span-3 border-l border-white/20 pl-4 flex flex-col justify-center gap-5 text-right">
                                        <div className="text-[10px]">
                                            <p className="font-black uppercase mb-1" style={{ color: labelData.accentColor }}>Thành phần</p>
                                            <p className="opacity-90 leading-tight">{labelData.ingredients}</p>
                                        </div>
                                        <div className="text-[10px]">
                                            <p className="font-black uppercase mb-1" style={{ color: labelData.accentColor }}>Hạn dùng</p>
                                            <p className="opacity-90 leading-tight">{labelData.expiry}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Footer Bar */}
                                <div className="w-full flex justify-between items-end border-t border-white/20 pt-2 relative z-50 print-no-transform">
                                    <div className="flex flex-col gap-2">
                                        <div className="text-[11px] font-black italic opacity-80 leading-none">{labelData.website}</div>
                                        <div className="bg-white text-gray-900 px-3 py-1 rounded-lg text-xs font-black w-fit shadow-md border border-black/5">
                                            NET WT: {labelData.weight}
                                        </div>
                                    </div>
                                    <div className="bg-white p-2 rounded-xl shadow-inner flex flex-col items-center border border-black/5">
                                        <div className="h-8 w-28 flex items-end gap-0.5 bg-gray-50 px-1 rounded overflow-hidden">
                                            {[...Array(24)].map((_, i) => (
                                                <div key={i} className="bg-gray-800" style={{ width: i%3==0 ? '2px' : '1px', height: `${60 + (i*7)%40}%` }}></div>
                                            ))}
                                        </div>
                                        <span className="text-[8px] text-gray-800 font-mono tracking-tighter mt-1">{labelData.barcode}</span>
                                    </div>
                                </div>

                                {/* Decorative Shapes (Hidden in Print for stability) */}
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -mr-32 -mt-32 decorative-shape"></div>
                                <div className="absolute bottom-0 left-0 w-48 h-48 bg-black/10 rounded-full blur-3xl -ml-24 -mb-24 decorative-shape"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
