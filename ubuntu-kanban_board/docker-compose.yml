version: '3.8'

services:
  web_service:
    container_name: telua_python_kanban_board
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    ports:
      - "5000:5000"
    volumes:
      - ./:/app/
      - /app/dist
      - /app/node_modules
    stdin_open: true
    tty: true
