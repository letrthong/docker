# docker-compose for Docupedia (copied from ubuntu-kanban_board)
version: '3.8'

services:
  web_service:
    container_name: telua_docupedia
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    volumes:
      - ./docupedia_data:/app/config
    ports:
      - "5001:5000"
    stdin_open: true
    tty: true

 